<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let n1 = parseInt(prompt("Enter n1:"));
        let n2 = parseInt(prompt("Enter n2:"));

        small = ( n1 < n2 ) ? n1 : n2;

        for ( i = small ; i >= 1 ; i--){
            if(n1 % i == 0 && n2 % i == 0){
                alert("GCD is :"+ i);
                break;
            }
        }

    </script>

</body>
</html>
