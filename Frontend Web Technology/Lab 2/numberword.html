<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let num = parseInt(prompt("Enter a number :"));

        if (isNaN(num)) {
            alert("Not a number !");
        } 
        else if (num < 0 || num > 999) {
            alert("Number is out of range !!");
        } 
        else if (num === 0) {
            alert("zero");
        } 
        else {
            let words = ""; 
            
            let ones = ["", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen", "seventeen", "eighteen", "nineteen"];
            let tens = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];
            let hundreds = ["One hundred", "Two hundred", "Three hundred", "Four hundred", "Five hundred", "six hundred", "Seven hundred", "Eight hundred", "Nine hundred"];

            // 1. Process hundreds place using your hundreds array
            if (num >= 100) {
                words += hundreds[Math.floor(num / 100) - 1] + " "; // -1 because arrays start at index 0
                num %= 100; // Keep the remainder
            }

            // 2. Process the remaining tens and ones
            if (num >= 20) {
                words += tens[Math.floor(num / 10)] + " " + ones[num % 10];
            } else if (num >= 1) {
                words += ones[num]; 
            }
            
            alert(words);
        }



    </script>

</body>
</html>
