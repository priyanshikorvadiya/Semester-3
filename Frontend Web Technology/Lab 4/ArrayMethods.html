<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        arr = [10,20,30,40,50,60]

        document.write("Array Methods :"+arr+"<br/>")
        arr.push(70);

        document.write("push() :"+arr+"<br/>")

        arr.pop()

        document.write("pop() :"+arr+"<br/>")

        arr.shift();

        document.write("shift() :"+arr+"<br/>")

        arr.unshift(10);

        document.write("unshift() :"+arr+"<br/>")

        arr.splice(2,1,26);

        document.write("splice() :"+arr+"<br/>")

        arr.slice(1,3);

        document.write("slice() :"+arr+"<br/>")

        arr.sort()

        document.write("sort() :"+arr+"<br/>")

        arr.reverse()

        document.write("reverse() :"+arr+"<br/>")

        arr.concat(60,70)

        document.write("concat() :"+arr+"<br/>")

    </script>

</body>
</html>
