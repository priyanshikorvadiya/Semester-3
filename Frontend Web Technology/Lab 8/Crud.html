<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Basic CRUD Function</h2>
    <input type="text" id="inputtxt" placeholder="Enter" />
    <button onclick="addData()">ADD</button>
    <hr />
    <table border="1" cellspacing="2" cellpadding="5">
      <tr>
        <td>Name</td>
        <td>Id</td>
        <td>Action</td>
      </tr>
      <tbody id="tableData"></tbody>
    </table>
    <script>
      let arr = [];

      function addData() {
        let name = document.getElementById("inputtxt").value;
        if (name == " ") {
          alert("Enter name : ");
          return;
        }
        arr.push(name);
        document.getElementById("inputtxt").value = " ";
        showData();
      }

      function showData() {
        let output = " ";
        for (let i = 0; i < arr.length; i++) {
          output += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${arr[i]}</td>
                    <td>
                        <button onclick="showUpdate(${i})">Update</button>
                        <button onclick="showDelete(${i})">Delete</button>
                    </td>
                </tr>`;
        }
        document.getElementById("tableData").innerHTML = output;
      }

      function showUpdate(index) {
        let newName = prompt("Enter new name : ", arr[index]);
        if (newName == " ") {
          alert("Empty!");
          return;
        }
        if (newName != null) {
          arr[index] = newName;
        }
        showData();
      }

      function showDelete(index) {
        arr.splice(index, 1);
        showData();
      }
    </script>
  </body>
</html>
