<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

    let n = parseInt(prompt("Enter a number :"));
    let fact = 1;

    if(n == 0){
        alert("Factorial of "+ n + " is zero.");
    }
    else{
        for(i = 1 ; i <= n ; i++){
            fact = fact * i;
        }
        alert("Factorial of a "+ n +" is "+ fact);
    }
    

</script>

</body>
</html>
