<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

    let n = parseInt(prompt("Enter  a number of elements of fibonacci series you want :"));

    let a = 0,b = 1,next;
    let result = ""

    for(let i = 1; i <= n;i++){

        result+=a;

        if(i !== n){
            result += ", "
        }

        next = a + b;
        a = b;
        b = next;
    }
    alert("Fibonacci series is : "+ result);

</script>

</body>
</html>
