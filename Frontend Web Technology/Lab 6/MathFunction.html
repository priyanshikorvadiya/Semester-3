<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let n = parseFloat(prompt("Enter floating point number :"));

      document.write("Math flooring :" + Math.floor(n) + "<br/>");
      document.write("Math ceiling :" + Math.ceil(n) + "<br/>");
      document.write("Math rounding :" + Math.round(n) + "<br/>");
      document.write("Math truncating :" + Math.trunc(n) + "<br/>");
    </script>
  </body>
</html>
