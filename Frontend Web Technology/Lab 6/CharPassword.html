<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let chars =
        "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let password = "";

      let length = parseInt(prompt("Enter length of your password :"));

      for (let i = 0; i < length; i++) {
        // Math.random() gives a random number between 0 and 1.
        // Multiplying by chars.length gets a random index.
        // Math.floor() rounds that number down to the nearest whole number.
        let randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
      }

      document.write("Your password :" + password);
    </script>
  </body>
</html>
