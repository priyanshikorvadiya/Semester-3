<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let n1 = parseInt(prompt("Enter n1 :"));
      let n2 = parseInt(prompt("Enter n2 :"));
      let n3 = parseInt(prompt("Enter n3 :"));

      document.write("Maximum number :" + Math.max(n1, n2) + "<br/>");
      document.write("Minimum number :" + Math.min(n1, n2) + "<br/>");
      document.write("Absolute value :" + Math.abs(n3) + "<br/>");
    </script>
  </body>
</html>
