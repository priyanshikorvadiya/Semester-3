<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function CurrentTime() {
        let d = new Date();

        let h = d.getHours();
        let m = d.getMinutes();
        let s = d.getSeconds();

        document.write(h + " : " + m + " : " + s + "<br/>");
      }

      setInterval(CurrentTime, 1000);
    </script>
  </body>
</html>
