<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let d = parseInt(prompt("Enter distance :"));
      let angled = parseInt(prompt("Enter angle(in degree) :"));

      let angler = (angled * Math.PI) / 180;

      let height = d / Math.tan(angler);

      document.write("Height is :" + height);
    </script>
  </body>
</html>
