<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let n = new Date();

      document.write("Current time :" + n.getTime() + "<br/>");

      document.write("Current day :" + n.getDay() + "<br/>");

      document.write("Current date :" + n.getDate() + "<br/>");

      document.write("Current month :" + (n.getMonth() + 1) + "<br/>");

      document.write("Current year :" + n.getFullYear() + "<br/>");
    </script>
  </body>
</html>
