<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        arr = [];

        let n = parseInt(prompt("Enter size of an array :"));

        for(let i = 0 ; i < n ; i++){
            value = prompt("Enter Element :");
            arr.push(value);
        }
        // arr = [34,0,9,67,80]
        max = arr[0];

        for(let i = 0; i < arr.length; i++){
            if(max < arr[i]){
                max = arr[i];
            }
        }

        document.write("Maximum number of the array :", max);

    </script>

</body>
</html>
