<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let arr = [98 , 25 , 56 , 7 , 90 , 100];

        for(let i = 0 ; i < arr.length - 1; i++){
            for(let j = 0 ; j < arr.length - 1 - i; j++){
                if(arr[j] > arr[j + 1]){
                    temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                }
            }
        }

        document.write("Sorted Array :",arr)

    </script>

</body>
</html>
