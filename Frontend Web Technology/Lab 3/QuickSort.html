    <script>

        function quicksort(arr){
            if(arr.length <= 1){
                return arr;
            }

            let pivot = arr[arr.length - 1];
            let left = [];//Smaller num
            let right = [];//Bigger num

            for( let i = 0; i < arr.length - 1; i++){
                if(arr[i] < pivot){
                    left.push(arr[i]);
                }
                else{
                    right.push(arr[i]);
                }
            }

            //spread operator
            return [...quicksort(left),pivot,...quicksort(right)];
        }

          userArray = [10,2,7,9,2,1];
        document.write("Original Array :",userArray,"<br/>");

          sortedArray = quicksort(userArray);
        document.write("Sorted Array :",sortedArray,"<br/>");
